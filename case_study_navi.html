<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming soon</title>

  <style>
    :root {
      --bg: #F4F3F0;
      --text: #3A3A3A;
      --muted: #6B6B6B;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 520px;
      padding: 24px;
    }

    .message {
      font-size: 22px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 32px;
    }

    .back-link {
      font-size: 16px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .back-link:hover {
      color: var(--text);
      border-bottom: 1px solid var(--text);
    }
  </style>
</head>

<body>
  <div class="container">
    <p class="message">
      oops, you're seeing this because my code got a little messy.<br>
      the page will be up in a jiffy :)
    </p>

    <a href="index.html#work" class="back-link">
      back to work
    </a>
  </div>
</body>
</html>
