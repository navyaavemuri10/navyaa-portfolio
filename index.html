<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navyaa Vemuri</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍊</text></svg>">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:#000;
    overflow:hidden;
  }
  video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  /* skip button */
  .skip{
    position:fixed;
    bottom:32px;right:32px;
    z-index:10;
    font-family:'DM Sans',sans-serif;
    font-size:12px;
    color:rgba(255,255,255,.5);
    background:none;
    border:none;
    cursor:pointer;
    letter-spacing:.06em;
    text-transform:uppercase;
    transition:color .2s;
    padding:8px;
  }
  .skip:hover{color:rgba(255,255,255,.9);}
</style>
</head>
<body>

<video
  id="intro-vid"
  src="herovid.mov"
  autoplay
  muted
  playsinline
  preload="auto"
></video>

<button class="skip" onclick="goHome()">Skip →</button>

<script>
  function goHome(){
    window.location.href='index.html';
  }

  const vid=document.getElementById('intro-vid');
  vid.onended=goHome;

  /* fallback: if video fails to load or play, go home after 100ms */
  vid.onerror=()=>setTimeout(goHome,100);
  vid.play().catch(()=>setTimeout(goHome,100));
</script>
</body>
</html>
