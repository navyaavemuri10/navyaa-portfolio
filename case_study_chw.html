<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Health Portal — Navyaa Vemuri</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FDFDFD;--surface:#F4F3F0;--border:#E8E8E4;
  --text:#1A1A1A;--muted:#6B6B6B;--dim:#ABABAB;
  --accent:#3B5BDB;--accent-bg:#EEF2FF;--accent-border:#C5D0FA;
  --conflict:#C4745A;--conflict-bg:#FDF0EC;--conflict-border:#F0C8B8;
  --shadow:0 12px 32px rgba(26,26,26,.06);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}

.layout{display:flex;min-height:100vh;}

/* DESKTOP SIDEBAR — MATCH NAVI EXACTLY */
.cs-sidebar{width:320px;flex-shrink:0;position:sticky;top:0;height:100vh;padding:48px;display:flex;flex-direction:column;border-right:.5px solid var(--border);background:var(--bg);}
.stamp{width:180px;margin-bottom:28px;flex-shrink:0;}
.stamp img{width:100%;display:block;background:#E8EAF0;min-height:130px;}
@keyframes stamp-float{0%{transform:translateY(0) rotate(-.5deg);}33%{transform:translateY(-6px) rotate(.3deg);}66%{transform:translateY(-3px) rotate(-.2deg);}100%{transform:translateY(0) rotate(-.5deg);}}
.stamp img{animation:stamp-float 4s ease-in-out infinite;will-change:transform;}
.stamp:hover img{animation-play-state:paused;}
.sidebar-mid{display:flex;flex-direction:column;gap:18px;}
.back-link{font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:.01em;transition:color .2s;}
.back-link:hover{color:var(--text);}
.toc-label{font-size:9px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase;margin-top:6px;}
.toc-list{list-style:none;display:flex;flex-direction:column;gap:1px;}
.toc-link{font-size:13px;color:var(--dim);text-decoration:none;display:block;padding:6px 0 6px 12px;border-left:1.5px solid var(--border);transition:color .2s,border-color .2s,padding-left .18s;line-height:1.4;}
