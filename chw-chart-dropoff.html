<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHW Drop-off Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FDFDFD;
    --surface: #F4F3F0;
    --border: #E8E8E4;
    --text: #1A1A1A;
    --muted: #6B6B6B;
    --dim: #ABABAB;
    --accent: #3B5BDB;
  }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 32px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 32px 24px;
    width: 100%;
    max-width: 680px;
  }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgb(26, 77, 58);
    margin-bottom: 6px;
  }
  .title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 24px;
  }
  .chart-wrap {
    position: relative;
    height: 260px;
  }
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Page Analytics</div>
  <div class="title">Top Pages: Views vs. Engaged Sessions</div>
  <div class="subtitle">Cal Poly Health — Google Analytics, Academic Year</div>
  <div class="chart-wrap">
    <canvas id="dropoffChart"></canvas>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#E8E8E4; border: 1px solid #ABABAB;"></div>
      Total views
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#3B5BDB;"></div>
      Engaged sessions
    </div>
  </div>
</div>

<script>
const gridColor = 'rgba(26,26,26,0.06)';
const labelColor = '#ABABAB';
const tickColor = '#6B6B6B';

new Chart(document.getElementById('dropoffChart'), {
  type: 'bar',
  data: {
    labels: ['Home', 'Counseling', 'Immunizations', 'About Us', 'Pharmacy', 'Immuniz. (Aug)', 'Basic Needs'],
    datasets: [
      {
        label: 'Total views',
        data: [9336, 4568, 3742, 2067, 1820, 1224, 1108],
        backgroundColor: '#E8E8E4',
        borderRadius: 4,
        borderSkipped: false,
      },
      {
        label: 'Engaged sessions',
        data: [4127, 1890, 1583, 864, 807, 535, 500],
        backgroundColor: '#3B5BDB',
        borderRadius: 4,
        borderSkipped: false,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1A1A1A',
        borderColor: '#E8E8E4',
        borderWidth: 1,
        titleColor: '#FDFDFD',
        bodyColor: '#ABABAB',
        padding: 12,
        callbacks: {
          label: ctx => '  ' + ctx.dataset.label + ': ' + ctx.raw.toLocaleString()
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        border: { display: false },
        ticks: { color: labelColor, font: { family: 'DM Sans', size: 11 }, maxRotation: 30 }
      },
      y: {
        grid: { color: gridColor },
        border: { display: false },
        ticks: {
          color: tickColor,
          font: { family: 'DM Sans', size: 11 },
          callback: v => v >= 1000 ? (v / 1000).toFixed(1) + 'K' : v
        }
      }
    }
  }
});
</script>
</body>
</html>
